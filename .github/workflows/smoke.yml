name: deterministic-smoke

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[test]'
      - name: Unit tests
        run: python -m pytest
      - name: Static checks
        run: python -m ruff check tcsm_rt scripts tests
