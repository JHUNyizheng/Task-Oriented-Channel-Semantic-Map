run:
  name: physics_probe
  seed: 20260719
  output_dir: outputs/physics_probe
  resume: true
  device: cpu
  train_steps: 2
  train_seeds: [11]
  eval_seeds: [101]
data:
  grid_size: 35
  cell_size_m: 2.0
  support_counts: [1, 12, 61]
  sampling_modes: [scatter, trajectory]
  sionna:
    enabled: true
    scenes: [simple_street_canyon]
    configs_per_split: {train: 1, id: 0, geometry_ood: 0, system_ood: 0, compound_ood: 0}
    train_frequencies_ghz: [28]
    train_arrays: [128]
    ood_frequencies_ghz: [60]
    ood_arrays: [160]
    max_depth: 3
    samples_per_source: 100000
    diffuse_reflection: true
    channel_mode: explicit_array
    explicit_batch_size: 8
    explicit_validation_points_per_scene: 4
  deepmimo:
    enabled: false
model:
  hidden: 32
  local_neighbors: 4
  far_beams: 41
  near_angles: 41
  near_ranges: 10
  baselines: [knn, idw, gated_hlg]
  learning_rate: 0.002
  weight_decay: 0.0001
  query_batch: 128
system:
  tx_power_dbm: 30.0
  bandwidth_hz: 100000000.0
  noise_figure_db: 7.0
  regime_low_margin_bps_hz: 0.20
  regime_high_margin_bps_hz: 0.75
statistics:
  bootstrap_samples: 100
  confidence: 0.95
